name: Download Decrypted IPA
on:
  workflow_dispatch:

jobs:
  auth_and_download:
    runs-on: macos-15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install IPATool
        run: |
          ARCH=$(uname -m)
          [ "$ARCH" = "arm64" ] && IPATOOL_ARCH="arm64" || IPATOOL_ARCH="amd64"

          curl -fL -o ipatool.tar.gz \
            "https://github.com/majd/ipatool/releases/download/v2.3.0/ipatool-2.3.0-macos-${IPATOOL_ARCH}.tar.gz"

          mkdir -p ipatool_extract
          tar -xzf ipatool.tar.gz -C ipatool_extract

          IPATOOL_BIN=$(find ipatool_extract -name "ipatool*" -type f | head -1)
          chmod +x "$IPATOOL_BIN"
          sudo mv "$IPATOOL_BIN" /usr/local/bin/ipatool
          ipatool --version

      - name: Unlock macOS Keychain
        run: |
          # Create a dedicated build keychain so ipatool can store credentials
          security create-keychain -p "ci-build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "ci-build" build.keychain
          # Keep it unlocked for the duration of the job (timeout in seconds)
          security set-keychain-settings -t 3600 -u build.keychain

      - name: Authenticate
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          ipatool auth login \
            --email "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --non-interactive \
            --verbose

      - name: Download IPA
        run: |
          ipatool download \
            --bundle-id com.blutron.power \
            --country CA \
            --output ./ \
            --verbose

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: blutron-ipa
          path: "*.ipa"
          if-no-files-found: error
