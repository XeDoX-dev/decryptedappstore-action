name: Apple 2FA Authentication and Download Decrypted IPA

on:
  workflow_dispatch:

jobs:
  auth_and_download:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download and Install IPATool Directly
        run: |
          curl -L -o ipatool.tar.gz https://github.com/majd/ipatool/releases/download/v2.3.0/ipatool-2.3.0-macos-arm64.tar.gz
          mkdir -p ipatool_extract
          tar -xzf ipatool.tar.gz -C ipatool_extract
          
          # Debug: Show what was extracted
          echo "Extracted contents:"
          find ipatool_extract -type f
          
          # Find and validate the binary
          IPATOOL_BIN=$(find ipatool_extract -name "ipatool" -type f | head -1)
          if [ -z "$IPATOOL_BIN" ]; then
            echo "ERROR: ipatool binary not found"
            exit 1
          fi
          
          chmod +x "$IPATOOL_BIN"
          sudo mv "$IPATOOL_BIN" /usr/local/bin/ipatool

      - name: Request Login and Force 2FA Push
        env:
          APPLE_ID: "${{ secrets.APPLE_ID }}"
          APPLE_PASSWORD: "${{ secrets.APPLE_PASSWORD }}"
        run: |
          ipatool auth login --email "$APPLE_ID" --password "$APPLE_PASSWORD"

      - name: Download and Decrypt IPA
        env:
          APPLE_ID: "${{ secrets.APPLE_ID }}"
          APPLE_PASSWORD: "${{ secrets.APPLE_PASSWORD }}"
        run: |
          ipatool download --bundle-id com.blutron.power --country CA --output ./

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: blutron-decrypted-ipa
          path: "*.ipa"
