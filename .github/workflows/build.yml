name: Trigger Live Apple 2FA Push

on:
  workflow_dispatch:

jobs:
  auth_and_download:
    runs-on: macos-latest
    steps:
      - name: Install IPATool Engine
        run: brew install majd/tap/ipatool

      - name: Request Login and Force 2FA Push
        env:
          APPLE_ID: "${{ secrets.APPLE_ID }}"
          APPLE_PASSWORD: "${{ secrets.APPLE_PASSWORD }}"
        run: |
          ipatool auth login --email "$APPLE_ID" --password "$APPLE_PASSWORD"
